name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm-release
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install npm with trusted publishing support
        run: npm install --global "npm@^11.10.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release identity
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Release tag must point to a commit reachable from main." >&2
            exit 1
          fi
          version="$(pnpm release:verify "$RELEASE_TAG")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Typecheck daemon
        run: pnpm typecheck

      - name: Check WebUI
        run: pnpm --filter ./webui run check

      - name: Check locale parity
        run: pnpm --filter ./webui run i18n:check:strict

      - name: Run tests
        run: pnpm test

      - name: Build publish artifact
        run: pnpm build

      - name: Inspect npm package
        run: npm pack --dry-run

      - name: Check existing registry version
        id: registry
        env:
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if published_version="$(npm view "pnpm-pub@$VERSION" version 2>/dev/null)"; then
            test "$published_version" = "$VERSION"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish with npm Trusted Publishing
        if: steps.registry.outputs.publish == 'true'
        run: npm publish --access public --provenance

      - name: Verify npm registry
        env:
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            published_version="$(npm view "pnpm-pub@$VERSION" version 2>/dev/null || true)"
            if [[ "$published_version" == "$VERSION" ]]; then
              echo "Verified pnpm-pub@$VERSION on npm."
              exit 0
            fi
            sleep 5
          done
          echo "pnpm-pub@$VERSION was not visible on npm after 60 seconds." >&2
          exit 1
