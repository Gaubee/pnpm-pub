# pnpm-pub CI (Chapter 10.3).
# Runs unit tests, the full build, and the E2E suite against a Dockerized
# Verdaccio registry so the publish red-line + clock-drift recovery are
# verified in a genuine registry loop on every push / PR.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (daemon)
        run: pnpm typecheck

      - name: Check (webui)
        run: pnpm --filter ./webui exec svelte-check --tsconfig ./tsconfig.json

      # i18n key parity + full translation: every locale must match en's shape
      # (missing/extra keys fail) AND have no untranslated keys (value === en,
      # except the curated allowlist of brand/technical terms). Strict mode
      # fails CI on any untranslated drift, so new keys must be translated
      # (or allowlisted) before merge.
      - name: i18n key-parity (webui)
        run: pnpm --filter ./webui i18n:check:strict

      - name: Unit and browser tests
        run: pnpm test

      - name: Full build
        run: pnpm build

      # E2E: boot a Dockerized Verdaccio (Chapter 10.3), then run the
      # publish-interception + clock-drift-recovery suite against it.
      - name: Start Verdaccio (Docker)
        shell: bash
        run: |
          set -euo pipefail
          if ! docker compose -f test/e2e/docker/verdaccio.compose.yml up -d --wait; then
            docker compose -f test/e2e/docker/verdaccio.compose.yml ps
            docker compose -f test/e2e/docker/verdaccio.compose.yml logs
            exit 1
          fi

      - name: E2E (real Verdaccio registry)
        env:
          PNPM_PUB_E2E_REGISTRY: http://localhost:4873
        run: pnpm test:e2e

      - name: Tear down Verdaccio
        if: always()
        run: docker compose -f test/e2e/docker/verdaccio.compose.yml down -v
