<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill-rule="evenodd" clip-rule="evenodd" stroke-linejoin="round" stroke-miterlimit="2">
  <!--
    npm mark (red square #c12127) + a corner badge dot signaling a pending
    publish awaiting confirmation. The dot is drawn AFTER the mark and sits on a
    neutral backing ring so it reads on both light and dark menubars. Rasterized
    to a 64x64 rgba PNG by scripts/gen-icons.mjs.
  -->
  <g fill-rule="nonzero">
    <path d="M10.999 500.999v-490h490v490h-490z" fill="#c12127"/>
    <path d="M102.874 102.874h306.25v306.25h-61.25v-245h-91.875v245H102.874v-306.25z" fill="#fff"/>
  </g>
  <!-- Pending badge: white ring + blue dot, bottom-right corner. -->
  <circle cx="416" cy="416" r="78" fill="#fff"/>
  <circle cx="416" cy="416" r="58" fill="#0a84ff"/>
</svg>
